name: CI/CD – Deploy Frontend to Vercel

on:
  push:
    branches: [ main ]

jobs:
  demo:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ljm-react

    steps:
      - name: 1. Clonar repositorio
        uses: actions/checkout@v4

      - name: 2. Configurar Node.js
        uses: actions/setup-node@v4
        with:
              node-version: '20'
              cache: 'npm'
              cache-dependency-path: ljm-react/package-lock.json

      - name: 3. Instalar dependencias
        run: npm ci

      - name: 4. Ejecutar ESLint
        run: npm run lint || true

      - name: 5. Compilar proyecto
        run: npm run build

      - name: 6. Deploy a Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./ljm-react
          vercel-args: '--prod'
